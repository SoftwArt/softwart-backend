services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: softwart
      POSTGRES_PASSWORD: softwart
      POSTGRES_DB: softwart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U softwart"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      target: build
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: softwart
      DB_PASSWORD: softwart
      DB_NAME: softwart
      JWT_SECRET: dev_secret_local_docker_no_usar_en_prod
      SMTP_USER: ""
      SMTP_PASS: ""
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
