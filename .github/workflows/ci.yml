name: CI / CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Type check & lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      # A06 (OWASP) — falla el build si una dependencia de PRODUCCIÓN tiene
      # una vulnerabilidad high o critical conocida. --omit=dev ignora el ruido
      # de herramientas de desarrollo (ts-node-dev, vitest…) que nunca se despliegan.
      - name: Security audit (prod deps)
        run: npm audit --omit=dev --audit-level=high

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Trigger Render deploy
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy triggered successfully"
