name: CI / CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Type check, lint & tests
    runs-on: ubuntu-latest

    # PostgreSQL efímero para las pruebas de integración. `setup.ts` se conecta a
    # la BD "softwart-db" y desde ahí crea "softwart_test" (que se recrea limpia
    # en cada corrida por `dropSchema: true` en modo test).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: softwart
          POSTGRES_PASSWORD: softwart
          POSTGRES_DB: softwart-db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      # Lint (ESLint) — complementa al type-check: variables sin usar, código
      # sospechoso y malas prácticas. Falla solo con errores; los warnings
      # (any pragmáticos) quedan visibles pero no bloquean.
      - name: Lint
        run: npm run lint

      # A06 (OWASP) — falla el build si una dependencia de PRODUCCIÓN tiene
      # una vulnerabilidad high o critical conocida. --omit=dev ignora el ruido
      # de herramientas de desarrollo (ts-node-dev, vitest…) que nunca se despliegan.
      - name: Security audit (prod deps)
        run: npm audit --omit=dev --audit-level=high

      # Pruebas dinámicas: unitarias + integración (Vitest + supertest).
      # Vitest descubre solo cualquier archivo *.test.ts, así que las pruebas
      # futuras se incluyen sin tocar este workflow.
      # ADMIN_EMAIL/ADMIN_PASSWORD se omiten a propósito: el seed usa sus valores
      # por defecto (admin@softwart.com / Admin1234!), que son los que esperan las pruebas.
      - name: Run tests (unit + integration)
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: softwart
          DB_PASSWORD: softwart
          DB_NAME: softwart_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-characters-ok
          FRONTEND_URL: http://localhost:3000
          # `new Resend(undefined)` lanza al importar email.service. Las pruebas no
          # envían correos: solo hace falta un valor no vacío para construir el cliente.
          RESEND_API_KEY: re_dummy_key_for_ci_no_emails_are_sent

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Trigger Render deploy
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy triggered successfully"
