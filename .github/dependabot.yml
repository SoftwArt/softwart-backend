# Dependabot — A06 (OWASP): mantiene las dependencias al día automáticamente.
# Abre Pull Requests cuando sale una versión nueva (o un parche de seguridad)
# de una dependencia. Docs: https://docs.github.com/code-security/dependabot
version: 2
updates:
  # Dependencias npm del backend. "/" = raíz de este repo (softwart-backend),
  # que es donde vive el package.json.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"

  # Las propias GitHub Actions del CI (actions/checkout, setup-node…) también
  # se versionan y sacan parches de seguridad. Esto las mantiene al día.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
    commit-message:
      prefix: "ci"
